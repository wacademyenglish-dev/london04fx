<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WOLF LABS | London Series 04</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config for Wolf Labs Theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBase: '#1c1917',
                        darkPanel: '#0a0a12',
                        darkCard: '#11111a',
                        neonRed: '#e07a5f',
                        neonCyan: '#d4a373',
                        textMuted: '#888899',
                        textLight: '#ffffff',
                    },
                    fontFamily: {
                        heading: ['"Orbitron"', 'sans-serif'],
                        body: ['"Outfit"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    boxShadow: {
                        'neon-red': '0 0 15px rgba(224, 122, 95, 0.4), inset 0 0 10px rgba(224, 122, 95, 0.2)',
                        'neon-cyan': '0 0 15px rgba(212, 163, 115, 0.4), inset 0 0 10px rgba(212, 163, 115, 0.2)',
                        'panel': '0 10px 40px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.05)',
                    }
                }
            }
        }
    </script>

    <style>
        /* BASE & SCROLLBAR */
        html, body { 
            background-color: #1c1917; color: #fff; overflow: hidden; 
            font-family: 'Outfit', sans-serif; user-select: none; 
            -webkit-tap-highlight-color: transparent;
            background-image: url('bg_ep04.jpg');
            background-size: cover;
            background-position: center;
        }
        .bg-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(circle at 50% 50%, rgba(28,25,23,0.8) 0%, rgba(0,0,0,0.98) 100%);
        }
        .bg-grid {
            position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.15;
            background-image: linear-gradient(rgba(212, 163, 115, 0.2) 1px, transparent 1px),
            linear-gradient(90deg, rgba(212, 163, 115, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
        }

        /* PANELS */
        .glass-panel {
            background: rgba(41,37,36, 0.85);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .slide-panel {
            width: 100%; max-width: 900px; margin: 0 auto;
            border-radius: 20px; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative; z-index: 10;
        }

        /* HUD & NAVIGATION */
        #hud-top {
            position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px;
            z-index: 1000; display: none; justify-content: space-between; align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
        }
        #nav-console {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px;
            z-index: 5000; display: flex; justify-content: space-between; align-items: center; padding: 0 30px;
            background: rgba(28,25,23,0.95); border-top: 1px solid rgba(0,240,255,0.2);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .hud-bar-container { width: 140px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
        .hud-bar-fill { height: 100%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); background-color: #e07a5f; box-shadow: 0 0 10px #e07a5f; }
        .hud-bar-fill.xp { background-color: #d4a373; box-shadow: 0 0 10px #d4a373; }

        /* BUTTONS */
        .btn-neon {
            background: transparent; color: #fff; font-family: 'Orbitron', sans-serif; font-weight: 700;
            padding: 14px 32px; border-radius: 8px; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px;
            border: 1px solid #d4a373; position: relative; overflow: hidden; font-size: 0.9rem; cursor: pointer;
            box-shadow: 0 0 15px rgba(212, 163, 115, 0.2), inset 0 0 10px rgba(212, 163, 115, 0.1);
        }
        .btn-neon:hover { background: rgba(212, 163, 115, 0.1); box-shadow: 0 0 20px rgba(212, 163, 115, 0.4), inset 0 0 15px rgba(212, 163, 115, 0.2); text-shadow: 0 0 8px rgba(255,255,255,0.8); }
        .btn-neon:active { transform: scale(0.98); }
        
        .btn-neon-red {
            border-color: #e07a5f; box-shadow: 0 0 15px rgba(224, 122, 95, 0.2), inset 0 0 10px rgba(224, 122, 95, 0.1);
        }
        .btn-neon-red:hover { background: rgba(224, 122, 95, 0.1); box-shadow: 0 0 20px rgba(224, 122, 95, 0.4), inset 0 0 15px rgba(224, 122, 95, 0.2); }

        /* QUIZ ROW */
        .mcq-row {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; display: flex; align-items: center; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .mcq-row:hover:not(.locked-check) { border-color: #d4a373; background: linear-gradient(145deg, rgba(212,163,115,0.1) 0%, rgba(255,255,255,0.02) 100%); transform: translateX(8px); box-shadow: -4px 8px 20px rgba(0,0,0,0.4); }
        .mcq-row.correct { border-color: #d4a373; background: rgba(212,163,115,0.2); box-shadow: inset 0 0 20px rgba(212,163,115,0.3); color: #fff; }
        .mcq-row.wrong { border-color: #e07a5f; background: rgba(224,122,95,0.2); box-shadow: inset 0 0 20px rgba(224,122,95,0.3); color: #fff; }

        /* ROULETTE */
        .roulette-container {
            width: 100%; max-width: 500px; margin: 0 auto; padding: 20px;
            background: rgba(0,0,0,0.4); border-radius: 16px; border: 1px solid rgba(0,240,255,0.2);
            text-align: center;
        }
        .roulette-display {
            font-size: 1.5rem; font-weight: 700; color: #fff; padding: 30px;
            background: rgba(0,240,255,0.05); border-radius: 12px; min-height: 120px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s;
        }
        .roulette-display.spinning {
            animation: pulse-border 0.5s infinite alternate; color: #d4a373;
        }

        /* LOGIC BOARD */
        .node-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: #fff; padding: 1.5rem;
            border-radius: 12px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align: center;
            font-weight: 500; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .node-card:hover:not(.matched) { border-color: #d4a373; background: rgba(212,163,115,0.1); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .node-card.active { border-color: #e07a5f; background: rgba(224,122,95,0.1); box-shadow: 0 0 20px rgba(224,122,95,0.4); transform: scale(1.02); }
        .node-card.matched { background: rgba(212,163,115,0.1); color: #d4a373; border-color: #d4a373; pointer-events: none; opacity: 0.7; }

        /* FLIP CARDS */
        .flip-card { perspective: 1000px; cursor: pointer; height: 180px; width: 100%; }
        .flip-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
        }
        .flip-back { background: rgba(0,240,255,0.05); border-color: #d4a373; transform: rotateY(180deg); }

        /* BUILDER PILLS */
        .build-pill {
            background: linear-gradient(to bottom, rgba(255,255,255,0.08), rgba(255,255,255,0.02)); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 12px 24px;
            border-radius: 10px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 600; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .build-pill:hover { border-color: #d4a373; background: rgba(212,163,115,0.2); color: #fff; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(212,163,115,0.2); }
        .build-pill.used { opacity: 0; pointer-events: none; transform: scale(0.8); }

        /* CHALKBOARD (FOLLOW-UP) */
        .chalkboard {
            display: none; margin-top: 20px; background: rgba(0,0,0,0.6); border: 1px dashed #e07a5f;
            border-radius: 12px; padding: 20px; animation: fadeIn 0.5s forwards;
        }
        
        .chalkboard-question {
            color: #e07a5f; font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; font-family: 'Orbitron', sans-serif;
        }

        /* SCANNER MECHANIC */
        .scanner-canvas {
            background: rgba(0,0,0,0.4); border: 1px dashed #d4a373; border-radius: 16px; min-height: 250px;
            display: flex; align-items: center; justify-content: center; position: relative; gap: 20px; padding: 20px;
        }
        .scanner-dropzone {
            width: 120px; height: 120px; border: 1px dashed #444; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.3s; color: #666; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .scanner-dropzone.drag-over { border-color: #d4a373; background: rgba(0,240,255,0.1); color: #d4a373; }
        .scanner-dropzone.filled { border-color: #e07a5f; background: rgba(255,0,60,0.1); color: #e07a5f; box-shadow: inset 0 0 15px rgba(255,0,60,0.2); }
        .scanner-tag {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 15px;
            cursor: grab; display: inline-flex; align-items: center; justify-content: center; font-weight: 600;
        }
        .scanner-tag.dragging { opacity: 0.5; transform: scale(1.05); border-color: #d4a373; }

        @keyframes pulse-border {
            from { border-color: rgba(0,240,255,0.2); box-shadow: 0 0 5px rgba(0,240,255,0.1); }
            to { border-color: rgba(0,240,255,0.8); box-shadow: 0 0 15px rgba(0,240,255,0.4); }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        
        /* IFRAME WRAPPER */
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    </style>
</head>
<body class="text-base">

    <div class="bg-overlay"></div>
    <div class="bg-grid"></div>

    <!-- AUDIO -->
    <audio id="sfx-success" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" preload="auto"></audio>
    <audio id="sfx-error" src="https://assets.mixkit.co/active_storage/sfx/2570/2570-preview.mp3" preload="auto"></audio>
    <audio id="sfx-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="sfx-spin" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>

    <!-- HUD TOP -->
    <div id="hud-top">
        <div class="flex items-center gap-10">
            <div class="flex flex-col gap-1">
                <span class="text-[10px] font-bold text-neonRed uppercase tracking-widest font-heading">Health (HP)</span>
                <div class="hud-bar-container"><div id="hp-bar" class="hud-bar-fill" style="width: 100%;"></div></div>
            </div>
            <div class="flex flex-col gap-1">
                <span class="text-[10px] font-bold text-neonCyan uppercase tracking-widest font-heading">Progress (XP)</span>
                <div class="hud-bar-container"><div id="xp-bar" class="hud-bar-fill xp" style="width: 0%;"></div></div>
            </div>
        </div>
        <div class="text-right flex items-center gap-6">
            <button onclick="toggleFullscreen()" class="text-textMuted hover:text-white transition-colors" title="Fullscreen"><i class="fas fa-expand text-lg"></i></button>
            <div class="hidden sm:block text-right ml-4">
                <p class="font-heading text-xl font-bold text-white tracking-widest leading-none">WOLF LABS</p>
                <p class="text-[9px] font-bold text-neonCyan tracking-[0.2em] uppercase mt-1 font-mono">Terminal 04</p>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <main id="dashboard" class="flex flex-col items-center justify-center relative px-4 md:px-8 z-10 w-full h-screen overflow-hidden">
        <!-- Render Container -->
        <div id="slide-container" class="w-full max-w-4xl flex flex-col justify-center min-h-[60vh]">
            <!-- Dynamic Injection -->
        </div>
    </main>

    <!-- NAV CONSOLE -->
    <div id="nav-console" style="display: none;">
        <div class="flex items-center gap-4">
            <button onclick="prevStep()" id="btn-prev" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center text-textMuted hover:text-white hover:border-white/30 transition-all disabled:opacity-30 disabled:pointer-events-none">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div class="flex flex-col">
                <span class="text-[10px] text-textMuted uppercase tracking-widest font-mono">Module Status</span>
                <span class="text-sm font-bold text-white"><span id="hud-step">01</span><span class="text-white/30"> / 26</span></span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="nextStep()" id="btn-next" class="btn-neon flex items-center gap-3">
                <span>NEXT</span><i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <script>
        const TYPES = { COVER: 'cover', VIDEO: 'video', GRAMMAR: 'grammar', QUIZ: 'quiz', VOCAB: 'vocab', SCANNER: 'scanner', BUILDER: 'builder', ROULETTE: 'roulette', SPEAKING: 'speaking', WRAP: 'wrap' };
        
        const lessonData = [
            // 01
            { type: TYPES.COVER, title: "LONDON SERIES 04", subtitle: "THE COZY WARDROBE", desc: "Learn to describe clothes, colors, and sizes. Bob needs a coat in Cambridge!", icon: "fa-solid fa-shirt" },
            // 02
            { type: TYPES.GRAMMAR, title: "TEACHER'S GUIDE", desc: "For the Instructor",
              rules: [
                  { rule: "OBJECTIVE", example: "Master adjective order (Size + Color + Noun)." },
                  { rule: "CONVERSATION", example: "Encourage students to answer the follow-up questions." },
                  { rule: "ROLEPLAY", example: "Act as the seller while the student acts as Bob." }
              ]
            },
            // 03
            { type: TYPES.ROULETTE, title: "WARM UP: CLOTHES & WEATHER", 
              items: ["What do you wear when it is cold?", "Do you like winter?", "What is your favorite color to wear?", "Where do you buy clothes?", "Is it cold in your city today?", "Do you prefer summer or winter?"] },
            // 04
            { type: TYPES.VIDEO, title: "THE EPISODE", desc: "Watch the full episode. Bob is in Cambridge, and he is very cold!", videoId: "FnMVGYhlE-M" },
            // 05
            { type: TYPES.QUIZ, title: "QUICK CHECK", question: "Where is Bob right now?", options: ["In London", "In Edinburgh", "In Cambridge", "In Oxford"], answer: 2 },
            // 06
            { type: TYPES.GRAMMAR, title: "GRAMMAR: I AM vs I WANT", desc: "Use 'I AM' for how you feel and 'I WANT' for things you need.",
              rules: [
                  { rule: "I AM COLD", example: "Feeling" },
                  { rule: "I WANT A COAT", example: "Need" }
              ]
            },
            // 07
            { type: TYPES.VOCAB, title: "SIZE VOCABULARY", desc: "Match the abbreviations to the size names.",
              left: [{id:'1', text:'S'}, {id:'2', text:'M'}, {id:'3', text:'L'}],
              right: [{id:'3', text:'Large'}, {id:'1', text:'Small'}, {id:'2', text:'Medium'}]
            },
            // 08
            { type: TYPES.VOCAB, title: "COLOR VOCABULARY", desc: "Match the colors.",
              left: [{id:'1', text:'Black'}, {id:'2', text:'Yellow'}, {id:'3', text:'Red'}],
              right: [{id:'2', text:'Yellow'}, {id:'3', text:'Red'}, {id:'1', text:'Black'}]
            },
            // 09
            { type: TYPES.QUIZ, title: "UNDERSTANDING BOB", question: "Bob says: 'I want a coat. It is very cold today.' Why does he want a coat?", options: ["Because he wants to look stylish.", "Because he is cold.", "Because he likes shopping.", "Because Fran asked him to."], answer: 1 },
            // 10
            { type: TYPES.VIDEO, title: "THE OPTIONS", desc: "Watch Bob talk to the seller about sizes and colors.", videoId: "FnMVGYhlE-M", start: 75, end: 190 },
            // 11
            { type: TYPES.GRAMMAR, title: "ADJECTIVE ORDER", desc: "In English, the adjective comes before the noun, and size comes before color.",
              rules: [
                  { rule: "SIZE + COLOR + THING", example: "A small black coat" },
                  { rule: "SIZE + COLOR + THING", example: "A large red bag" }
              ]
            },
            // 12
            { type: TYPES.SCANNER, title: "BUILD THE OUTFIT", desc: "Bob needs a specific coat. Drag the correct size and color tags to the scanner.", reqSize: "SMALL", reqColor: "BLACK", options: ["LARGE", "RED", "SMALL", "YELLOW", "MEDIUM", "BLACK"] },
            // 13
            { type: TYPES.BUILDER, title: "SENTENCE BUILDER", desc: "Build the sentence: 'I want a small black coat.'", expected: ["I", "want", "a", "small", "black", "coat"], words: ["coat", "a", "I", "black", "want", "small", "am", "the"] },
            // 14
            { type: TYPES.SPEAKING, title: "LET'S TALK: COLORS", desc: "Flip the cards and discuss the questions with your teacher.", 
              cards: [
                  { front: "Do colors change how you feel?", back: "(e.g. Does yellow make you happy?)" },
                  { front: "What color do you NEVER wear?", back: "(Why is it a bad color for you?)" }
              ]
            },
            // 15
            { type: TYPES.VIDEO, title: "THE PRICE", desc: "Watch Bob finding out the price of the coat.", videoId: "FnMVGYhlE-M", start: 190, end: 313 },
            // 16
            { type: TYPES.QUIZ, title: "PRICE CHECK", question: "How much is the coat?", options: ["15 pounds", "50 pounds", "5 pounds", "100 pounds"], answer: 1 },
            // 17
            { type: TYPES.QUIZ, title: "BOB'S OPINION", question: "What does Bob think about the price?", options: ["It is cheap.", "It is a good price.", "It is expensive.", "He doesn't care."], answer: 2 },
            // 18
            { type: TYPES.GRAMMAR, title: "EXPENSIVE vs CHEAP", desc: "Vocabulary for prices.",
              rules: [
                  { rule: "EXPENSIVE", example: "Costing a lot of money" },
                  { rule: "CHEAP", example: "Low in price" }
              ]
            },
            // 19
            { type: TYPES.BUILDER, title: "SENTENCE BUILDER", desc: "Build the sentence: 'It is a very warm coat.'", expected: ["It", "is", "a", "very", "warm", "coat"], words: ["warm", "It", "is", "coat", "a", "very", "cold"] },
            // 20
            { type: TYPES.SPEAKING, title: "WHAT WOULD YOU DO?", desc: "Discuss these shopping scenarios.", 
              cards: [
                  { front: "You buy a shirt online. The size is wrong. What do you do?", back: "(Do you return it or give it to a friend?)" },
                  { front: "The seller wants you to buy a very expensive coat. What do you say?", back: "(Do you say 'No, thank you' and walk away?)" }
              ]
            },
            // 21
            { type: TYPES.SPEAKING, title: "LET'S TALK: PRICES", desc: "Discuss with your teacher.", 
              cards: [
                  { front: "Do you prefer cheap clothes or expensive clothes?", back: "(Why?)" },
                  { front: "Tell me about a very expensive thing you have.", back: "(Was it a good idea to buy it?)" }
              ]
            },
            // 22
            { type: TYPES.QUIZ, title: "FINAL DECISION", question: "Does Bob like the coat?", options: ["Yes, because it is cheap.", "No, because it is small.", "Yes, because it is warm, but it is expensive.", "No, he hates the color."], answer: 2 },
            // 23
            { type: TYPES.ROULETTE, title: "CONVERSATION: SHOPPING", 
              items: ["Is Â£50 expensive for a coat in your country?", "Do you like to buy expensive clothes?", "Where is a good place to buy cheap clothes in your city?", "What is the most expensive thing you own?", "Do you usually try on clothes before buying?", "Do you shop online or in stores?"] },
            // 24
            { type: TYPES.VOCAB, title: "FINAL REVIEW", desc: "Match the words to their categories.",
              left: [{id:'1', text:'Small / Medium / Large'}, {id:'2', text:'Black / Yellow / Red'}, {id:'3', text:'Expensive / Cheap'}],
              right: [{id:'2', text:'Colors'}, {id:'3', text:'Price Adjectives'}, {id:'1', text:'Sizes'}]
            },
            // 25
            { type: TYPES.SPEAKING, title: "FASHION & YOU", desc: "Final conversation questions.", 
              cards: [
                  { front: "Are famous brands important to you?", back: "(Do you like logos like Nike or Gucci?)" },
                  { front: "What is your favorite outfit?", back: "(Talk about the colors and the style.)" }
              ]
            },
            // 26
            { type: TYPES.WRAP, title: "MISSION COMPLETE", subtitle: "WARDROBE MASTERED", desc: "You can now describe clothes, sizes, colors, and prices confidently. Bob is warm now, but his wallet is empty!" }
        ];

        let state = { currentStep: 0, hp: 100, xp: 0, totalSteps: lessonData.length };
        const sfx = { 
            click: () => { let a = document.getElementById('sfx-click'); a.currentTime = 0; a.play().catch(e=>{}); },
            success: () => { let a = document.getElementById('sfx-success'); a.currentTime = 0; a.play().catch(e=>{}); },
            error: () => { let a = document.getElementById('sfx-error'); a.currentTime = 0; a.play().catch(e=>{}); },
            spin: () => { let a = document.getElementById('sfx-spin'); a.currentTime = 0; a.play().catch(e=>{}); }
        };

        function init() {
            document.getElementById('hud-top').style.display = 'flex';
            document.getElementById('nav-console').style.display = 'flex';
            renderSlide(0);
        }

        function updateHUD() {
            document.getElementById('hud-step').innerText = (state.currentStep + 1).toString().padStart(2, '0');
            document.getElementById('hp-bar').style.width = `${Math.max(0, state.hp)}%`;
            document.getElementById('xp-bar').style.width = `${Math.min(100, (state.xp / 120) * 100)}%`;
            
            document.getElementById('btn-prev').disabled = state.currentStep === 0;
            if (state.currentStep === state.totalSteps - 1) {
                document.getElementById('btn-next').style.display = 'none';
            } else {
                document.getElementById('btn-next').style.display = 'flex';
            }
        }

        function renderSlide(index) {
            const container = document.getElementById('slide-container');
            const d = lessonData[index];
            container.innerHTML = '';
            
            let html = `<div class="glass-panel slide-panel p-8 md:p-12 fade-in" id="slide-${index}">`;
            
            if(d.type === TYPES.COVER) html += bCover(d);
            else if(d.type === TYPES.VIDEO) html += bVideo(d);
            else if(d.type === TYPES.GRAMMAR) html += bGrammar(d);
            else if(d.type === TYPES.QUIZ) html += bQuiz(d);
            else if(d.type === TYPES.VOCAB) html += bVocab(d);
            else if(d.type === TYPES.BUILDER) html += bBuilder(d);
            else if(d.type === TYPES.ROULETTE) html += bRoulette(d);
            else if(d.type === TYPES.SPEAKING) html += bSpeaking(d);
            else if(d.type === TYPES.SCANNER) html += bScanner(d);
            else if(d.type === TYPES.WRAP) html += bWrap(d);

            html += `</div>`;
            container.innerHTML = html;
            updateHUD();

            if(d.type === TYPES.ROULETTE) initRoulette();
            if(d.type === TYPES.SCANNER) initScanner();
        }

        function nextStep() { if(state.currentStep < state.totalSteps - 1) { state.currentStep++; renderSlide(state.currentStep); } }
        function prevStep() { if(state.currentStep > 0) { state.currentStep--; renderSlide(state.currentStep); } }

        function triggerSuccess(xpGain) { sfx.success(); state.xp += xpGain; confetti({particleCount:100, spread:70, origin:{y:0.6}, colors:['#d4a373', '#e07a5f']}); updateHUD(); }
        function triggerError(hpLoss) { sfx.error(); state.hp -= hpLoss; updateHUD(); }

        /* BUILDERS */
        function bCover(d) {
            return `
            <div class="text-center">
                <i class="${d.icon} text-6xl text-neonCyan mb-6 drop-shadow-[0_0_15px_rgba(0,240,255,0.8)]"></i>
                <h1 class="font-heading text-4xl md:text-6xl font-bold mb-4 tracking-widest text-white">${d.title}</h1>
                <p class="text-neonRed font-mono tracking-[0.3em] uppercase text-sm mb-8">${d.subtitle}</p>
                <p class="text-textMuted text-lg max-w-2xl mx-auto leading-relaxed">${d.desc}</p>
            </div>`;
        }

        function bVideo(d) {
            let src = `https://www.youtube.com/embed/${d.videoId}?rel=0&modestbranding=1`;
            if(d.start) src += `&start=${d.start}`;
            if(d.end) src += `&end=${d.end}`;
            return `
            <div class="text-center">
                <h2 class="font-heading text-2xl text-neonCyan tracking-widest mb-2">${d.title}</h2>
                <p class="text-textMuted mb-6 text-sm uppercase tracking-wider">${d.desc}</p>
                <div class="video-wrapper">
                    <iframe src="${src}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>`;
        }

        function bGrammar(d) {
            let list = d.rules.map(r => `
                <div class="bg-[rgba(255,255,255,0.03)] border border-white/10 p-6 rounded-xl flex flex-col gap-2">
                    <div class="text-neonCyan font-mono font-bold tracking-wider">${r.rule}</div>
                    <div class="text-white/80 italic border-l-2 border-neonRed pl-3 mt-1">${r.example}</div>
                </div>
            `).join('');
            return `
            <div class="text-center">
                <h2 class="font-heading text-2xl text-neonCyan tracking-widest mb-2">${d.title}</h2>
                <p class="text-textMuted mb-8 text-sm uppercase tracking-wider">${d.desc}</p>
                <div class="grid gap-4 text-left">
                    ${list}
                </div>
            </div>`;
        }

        function bQuiz(d) {
            let opts = d.options.map((o, i) => `
                <div class="mcq-row" onclick="handleQuiz(this, ${i === d.answer})">
                    <div class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center mr-4 text-xs font-mono text-white/50">${String.fromCharCode(65+i)}</div>
                    <span class="font-bold">${o}</span>
                </div>
            `).join('');
            return `
            <div>
                <h2 class="font-heading text-2xl text-neonCyan tracking-widest mb-2 text-center">${d.title}</h2>
                <div class="bg-[rgba(255,255,255,0.05)] border-l-4 border-neonRed p-6 rounded-r-xl mb-8">
                    <p class="text-xl font-medium">${d.question}</p>
                </div>
                <div class="opts-container">${opts}</div>
                <div id="quiz-chalkboard" class="chalkboard">
                    <div class="chalkboard-question">FOLLOW UP:</div>
                    <p class="text-white/90 italic" id="quiz-followup"></p>
                </div>
            </div>`;
        }

        function handleQuiz(el, isCorrect) {
            if(el.parentElement.classList.contains('locked')) return;
            el.parentElement.classList.add('locked');
            let rows = el.parentElement.querySelectorAll('.mcq-row');
            rows.forEach(r => r.classList.add('locked-check', 'opacity-50', 'pointer-events-none'));
            el.classList.remove('opacity-50');
            
            if(isCorrect) {
                el.classList.add('correct');
                triggerSuccess(10);
                // Conversational Chalkboard reveal
                let cb = document.getElementById('quiz-chalkboard');
                if(cb) {
                    cb.style.display = 'block';
                    let followUps = ["Do you usually feel cold or hot?", "What do you do when a product is very expensive?", "Do you like shopping for clothes?"];
                    document.getElementById('quiz-followup').innerText = followUps[Math.floor(Math.random()*followUps.length)];
                }
            } else {
                el.classList.add('wrong');
                triggerError(10);
            }
        }

        function bVocab(d) {
            // Shuffle rights safely to avoid array corruption
            let shuffledRights = [...d.right];
            for (let i = shuffledRights.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledRights[i], shuffledRights[j]] = [shuffledRights[j], shuffledRights[i]];
            }

            let lefts = d.left.map(i => `<div class="node-card" data-id="${i.id}" data-type="L" onclick="handleMatch(this)">${i.text}</div>`).join('');
            let rights = shuffledRights.map(i => `<div class="node-card" data-id="${i.id}" data-type="R" onclick="handleMatch(this)">${i.text}</div>`).join('');
            
            return `
            <div class="text-center">
                <h2 class="font-heading text-2xl text-neonCyan tracking-widest mb-2">${d.title}</h2>
                <p class="text-textMuted mb-8 text-sm uppercase tracking-wider">${d.desc}</p>
                <div class="grid grid-cols-2 gap-8 w-full" id="match-board">
                    <div class="flex flex-col gap-4" id="match-left">${lefts}</div>
                    <div class="flex flex-col gap-4" id="match-right">${rights}</div>
                </div>
            </div>`;
        }

        let matchState = { l: null, r: null, matched: 0 };
        function handleMatch(el) {
            if(el.classList.contains('matched')) return;
            sfx.click();
            let type = el.getAttribute('data-type');
            
            // clear previous active in same column
            let board = el.closest('#match-board');
            board.querySelectorAll(`.node-card.active[data-type="${type}"]`).forEach(n => n.classList.remove('active'));
            el.classList.add('active');

            if(type === 'L') matchState.l = el;
            else matchState.r = el;

            if(matchState.l && matchState.r) {
                if(matchState.l.getAttribute('data-id') === matchState.r.getAttribute('data-id')) {
                    matchState.l.classList.replace('active', 'matched');
                    matchState.r.classList.replace('active', 'matched');
                    triggerSuccess(5);
                    matchState.matched++;
                    let totalNeeded = board.querySelectorAll('#match-left .node-card').length;
                    if(matchState.matched === totalNeeded) {
                        setTimeout(() => triggerSuccess(15), 500);
                        matchState.matched = 0; // reset for next slide
                    }
                } else {
                    triggerError(5);
                    matchState.l.classList.remove('active');
                    matchState.r.classList.remove('active');
                }
                matchState.l = null; matchState.r = null;
            }
        }

        function bBuilder(d) {
            let pills = d.words.sort(()=>Math.random()-0.5).map(w => `<div class="build-pill" onclick="moveTypeWord(this)">${w}</div>`).join('');
            return `
            <div class="text-center builder-slide" data-expected="${d.expected.join('|')}">
                <h2 class="font-heading text-2xl text-neonCyan tracking-widest mb-2">${d.title}</h2>
                <p class="text-textMuted mb-8 text-sm uppercase tracking-wider">${d.desc}</p>
                
                <div class="bg-[rgba(255,255,255,0.02)] border border-dashed border-white/20 min-h-[60px] p-4 rounded-xl flex flex-wrap gap-2 mb-8 justify-center items-center" id="build-dropzone">
                </div>
                
                <div class="flex flex-wrap gap-3 justify-center" id="build-pool">
                    ${pills}
                </div>
                <button onclick="resetWb()" class="mt-8 text-xs text-textMuted hover:text-neonRed transition-colors uppercase font-mono tracking-widest"><i class="fa-solid fa-rotate-right mr-2"></i>Reset</button>
            </div>`;
        }

        function moveTypeWord(el) {
            sfx.click();
            el.classList.add('used');
            let clone = el.cloneNode(true);
            clone.classList.remove('used');
            clone.onclick = function() { 
                this.remove(); 
                el.classList.remove('used'); 
            };
            document.getElementById('build-dropzone').appendChild(clone);

            let slide = el.closest('.builder-slide');
            let expArr = slide.getAttribute('data-expected').split('|');
            let currArr = Array.from(document.getElementById('build-dropzone').children).map(c => c.innerText);
            
            if(currArr.length === expArr.length) {
                if(currArr.join('|') === expArr.join('|')) {
                    document.getElementById('build-dropzone').classList.replace('border-white/20', 'border-neonCyan');
                    triggerSuccess(15);
                } else {
                    document.getElementById('build-dropzone').classList.add('border-neonRed');
                    triggerError(5);
                }
            }
        }
        function resetWb() {
            sfx.click();
            document.getElementById('build-dropzone').innerHTML = '';
            document.getElementById('build-dropzone').className = 'bg-[rgba(255,255,255,0.02)] border border-dashed border-white/20 min-h-[60px] p-4 rounded-xl flex flex-wrap gap-2 mb-8 justify-center items-center';
            document.querySelectorAll('#build-pool .build-pill').forEach(p => p.classList.remove('used'));
        }

        function bSpeaking(d) {
            let cards = d.cards.map(c => `
                <div class="flip-card" onclick="this.classList.toggle('flipped'); sfx.click();">
                    <div class="flip-inner">
                        <div class="flip-front"><p class="text-xl font-bold">${c.front}</p></div>
                        <div class="flip-back"><p class="text-xl font-bold text-neonCyan">${c.back}</p></div>
                    </div>
                </div>
            `).join('');
            return `
            <div class="text-center">
                <h2 class="font-heading text-2xl text-neonCyan tracking-widest mb-2">${d.title}</h2>
                <p class="text-textMuted mb-8 text-sm uppercase tracking-wider">${d.desc}</p>
                <div class="grid md:grid-cols-2 gap-6 w-full">
                    ${cards}
                </div>
            </div>`;
        }

        // --- CUSTOM: ROULETTE ---
        let rouletteAvailable = [];
        let rouletteSpinning = false;
        function bRoulette(d) {
            return `
            <div class="text-center roulette-slide">
                <h2 class="font-heading text-2xl text-neonCyan tracking-widest mb-2">${d.title}</h2>
                <p class="text-textMuted mb-6 text-sm uppercase tracking-wider">Spin the wheel and answer out loud!</p>
                <div class="roulette-container">
                    <div id="roulette-text" class="roulette-display">Ready to spin?</div>
                    <div class="mt-4 text-xs font-mono text-textMuted mb-6">Questions remaining: <span id="roulette-count">${d.items.length}</span></div>
                    <button onclick="spinRoulette()" id="btn-spin" class="btn-neon"><i class="fa-solid fa-arrows-spin mr-2"></i>SPIN NOW</button>
                </div>
            </div>`;
        }

        function initRoulette() {
            const d = lessonData[state.currentStep];
            rouletteAvailable = [...d.items];
            document.getElementById('roulette-count').innerText = rouletteAvailable.length;
            document.getElementById('roulette-text').innerText = "Ready to spin?";
            document.getElementById('btn-spin').disabled = false;
        }

        function spinRoulette() {
            if(rouletteSpinning || rouletteAvailable.length === 0) return;
            rouletteSpinning = true;
            sfx.spin();
            let el = document.getElementById('roulette-text');
            let btn = document.getElementById('btn-spin');
            el.classList.add('spinning');
            btn.disabled = true;

            let ticks = 0;
            let interval = setInterval(() => {
                el.innerText = rouletteAvailable[Math.floor(Math.random() * rouletteAvailable.length)];
                ticks++;
                if(ticks > 15) {
                    clearInterval(interval);
                    el.classList.remove('spinning');
                    let chosenIndex = Math.floor(Math.random() * rouletteAvailable.length);
                    let finalQ = rouletteAvailable[chosenIndex];
                    el.innerText = finalQ;
                    rouletteAvailable.splice(chosenIndex, 1);
                    document.getElementById('roulette-count').innerText = rouletteAvailable.length;
                    rouletteSpinning = false;
                    triggerSuccess(5);
                    if(rouletteAvailable.length > 0) btn.disabled = false;
                    else btn.innerHTML = "<i class='fa-solid fa-check mr-2'></i>ALL DONE";
                }
            }, 100);
        }

        // --- CUSTOM: SCANNER (Drag & Drop Outfit) ---
        let scannerTagsPlaced = 0;
        function bScanner(d) {
            let optionsHtml = d.options.sort(()=>Math.random()-0.5).map(o => `
                <div class="scanner-tag" draggable="true" ondragstart="dragScan(event)" data-val="${o}">${o}</div>
            `).join('');
            
            return `
            <div class="text-center scanner-slide" data-req-size="${d.reqSize}" data-req-color="${d.reqColor}">
                <h2 class="font-heading text-2xl text-neonCyan tracking-widest mb-2">${d.title}</h2>
                <p class="text-textMuted mb-6 text-sm uppercase tracking-wider">${d.desc}</p>
                
                <div class="scanner-canvas mb-8">
                    <div class="scanner-dropzone" data-type="size" ondragover="allowDropScan(event)" ondragleave="leaveDropScan(event)" ondrop="dropScan(event)">SIZE</div>
                    <i id="scan-icon" class="fa-solid fa-shirt text-6xl text-white/10 transition-all duration-500"></i>
                    <div class="scanner-dropzone" data-type="color" ondragover="allowDropScan(event)" ondragleave="leaveDropScan(event)" ondrop="dropScan(event)">COLOR</div>
                </div>

                <div class="flex flex-wrap justify-center gap-3" id="scanner-pool">
                    ${optionsHtml}
                </div>
                
                <div id="scanner-chalkboard" class="chalkboard mt-8">
                    <div class="chalkboard-question">FOLLOW UP:</div>
                    <p class="text-white/90 italic">Is it difficult to find clothes your size? Why?</p>
                </div>
            </div>`;
        }

        function initScanner() { scannerTagsPlaced = 0; }
        function dragScan(ev) { ev.dataTransfer.setData("text", ev.target.getAttribute('data-val')); ev.target.classList.add('opacity-50'); }
        function allowDropScan(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); }
        function leaveDropScan(ev) { ev.currentTarget.classList.remove('drag-over'); }
        function dropScan(ev) {
            ev.preventDefault();
            let dz = ev.currentTarget;
            dz.classList.remove('drag-over');
            if(dz.classList.contains('filled')) return;

            let val = ev.dataTransfer.getData("text");
            let type = dz.getAttribute('data-type');
            let slide = dz.closest('.scanner-slide');
            let reqSize = slide.getAttribute('data-req-size');
            let reqColor = slide.getAttribute('data-req-color');

            // Find the original tag to remove it
            let sourceTag = document.querySelector(`.scanner-tag[data-val="${val}"]`);
            if(sourceTag) sourceTag.classList.remove('opacity-50');

            let expected = (type === 'size') ? reqSize : reqColor;
            
            if(val === expected) {
                dz.classList.add('filled');
                dz.innerHTML = `<span class="text-neonRed font-bold font-mono">${val}</span>`;
                if(sourceTag) sourceTag.style.display = 'none';
                triggerSuccess(10);
                scannerTagsPlaced++;

                // Color logic
                let icon = document.getElementById('scan-icon');
                if(type === 'color') {
                    if(val === 'RED') icon.className = "fa-solid fa-shirt text-6xl text-neonRed drop-shadow-[0_0_15px_rgba(255,0,60,0.8)] transition-all duration-500 scale-110";
                    else if(val === 'YELLOW') icon.className = "fa-solid fa-shirt text-6xl text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)] transition-all duration-500 scale-110";
                    else if(val === 'BLACK') icon.className = "fa-solid fa-shirt text-6xl text-gray-800 drop-shadow-[0_0_15px_rgba(255,255,255,0.4)] transition-all duration-500 scale-110";
                }

                if(scannerTagsPlaced === 2) {
                    document.getElementById('scanner-chalkboard').style.display = 'block';
                }
            } else {
                triggerError(5);
                dz.classList.add('border-neonRed');
                setTimeout(() => dz.classList.remove('border-neonRed'), 500);
            }
        }

        /* WRAP */
        function bWrap(d) {
            return `
            <div class="text-center py-10">
                <i class="fa-solid fa-shield-halved text-8xl text-neonCyan mb-8 drop-shadow-[0_0_30px_rgba(0,240,255,0.6)]"></i>
                <h1 class="font-heading text-4xl font-bold mb-4 tracking-widest text-white">${d.title}</h1>
                <p class="text-neonRed font-mono tracking-[0.3em] uppercase mb-8">${d.subtitle}</p>
                <p class="text-textMuted text-lg max-w-xl mx-auto leading-relaxed mb-8">${d.desc}</p>
                <div class="inline-block border border-neonCyan/30 bg-neonCyan/10 p-6 rounded-xl font-mono text-neonCyan">
                    XP ACQUIRED: <span class="font-bold text-xl">${state.xp}</span>
                </div>
            </div>`;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err=>{});
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        document.addEventListener('dragend', (e) => { if(e.target.classList && e.target.classList.contains('scanner-tag')) e.target.classList.remove('opacity-50'); });

        window.onload = init;
    </script>
</body>
</html>
